<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Welcome to the official AWS Student Builder Group (SBG) at Ganpat University. Accelerate your career in Cloud Computing, AI/ML, DevOps, and Cybersecurity through hands-on labs and certifications." />
    <meta name="keywords" content="AWS, Ganpat University, AWS Student Builder Group, SBG GUNI, Cloud Computing, Mehsana, AWS Academy, Learn AWS, DevOps, AI, ML" />

    <!-- Scroll to Top Stylesheet -->
    <link rel="stylesheet" href="/scroll-to-top.css" />
  </head>
  <body>
    <div id="root"></div>
    
    <!-- ============================== -->
    <!-- SCROLL TO TOP BUTTON            -->
    <!-- Appears after scrolling down.    -->
    <!-- Safe to reposition via CSS below.-->
    <!-- ============================== -->
    <button id="scroll-to-top" aria-label="Scroll to top" title="Scroll to top">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <!-- Scroll to Top Javascript Logic -->
    <script src="/scroll-to-top.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
